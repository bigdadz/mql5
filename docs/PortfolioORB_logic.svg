<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="2520" viewBox="0 0 1240 2520" font-family="'Sukhumvit Set','Thonburi','Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <style>
      .lbl   { font-size:13px; fill:#222; }
      .lblw  { font-size:13px; fill:#fff; }
      .small { font-size:11px; fill:#444; }
      .edge  { font-size:11px; fill:#b00; font-weight:bold; }
      .h     { font-size:17px; fill:#1a237e; font-weight:bold; }
      .sub   { font-size:14px; fill:#4a148c; font-weight:bold; }
      line.f, path.f { stroke:#555; stroke-width:1.6; fill:none; }
    </style>
  </defs>

  <rect x="0" y="0" width="1240" height="2520" fill="#fbfbfd"/>
  <text x="620" y="34" text-anchor="middle" class="h" font-size="22">PortfolioORB_EA — Logic Flow</text>

  <!-- ============ SECTION 1: OnTick ============ -->
  <text x="40" y="78" class="sub">① OnTick()  — ทุก tick</text>
  <line x1="40" y1="86" x2="1200" y2="86" stroke="#7e57c2" stroke-width="1"/>

  <!-- start oval -->
  <ellipse cx="620" cy="120" rx="120" ry="24" fill="#e6e6e6" stroke="#888"/>
  <text x="620" y="125" text-anchor="middle" class="lbl">OnTick()</text>
  <path class="f" d="M620,144 L620,176" marker-end="url(#arrow)"/>

  <!-- diamond new day -->
  <polygon points="620,180 760,225 620,270 480,225" fill="#fff3cd" stroke="#f0ad4e"/>
  <text x="620" y="229" text-anchor="middle" class="lbl">วันใหม่? (IsNewDay)</text>

  <!-- yes -> reset box (left) -->
  <path class="f" d="M480,225 L300,225" marker-end="url(#arrow)"/>
  <text x="395" y="218" text-anchor="middle" class="edge">yes</text>
  <rect x="40" y="185" width="250" height="80" rx="8" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="165" y="208" text-anchor="middle" class="small">รีเซ็ตทั้งวัน:</text>
  <text x="165" y="226" text-anchor="middle" class="small">• dayStartEquity = equity</text>
  <text x="165" y="244" text-anchor="middle" class="small">• ปลดล็อก DD-stop</text>
  <text x="165" y="262" text-anchor="middle" class="small">• ทุก symbol → IDLE, ยังไม่เทรด</text>
  <path class="f" d="M165,265 L165,300 L470,300" marker-end="url(#arrow)"/>

  <!-- no -> down -->
  <path class="f" d="M620,270 L620,318" marker-end="url(#arrow)"/>
  <text x="635" y="292" class="edge">no</text>

  <!-- always band -->
  <rect x="380" y="320" width="480" height="62" rx="8" fill="#ede7f6" stroke="#7e57c2"/>
  <text x="620" y="345" text-anchor="middle" class="lbl">★ ทำงานเสมอ (ทุก symbol):</text>
  <text x="620" y="365" text-anchor="middle" class="small">ManageTrailing(i)  ·  ถ้าเวลา ≥ 20:00 → CloseSym(i) (force close)</text>
  <path class="f" d="M620,382 L620,414" marker-end="url(#arrow)"/>

  <!-- diamond DD -->
  <polygon points="620,418 770,468 620,518 470,468" fill="#fff3cd" stroke="#f0ad4e"/>
  <text x="620" y="464" text-anchor="middle" class="lbl">DD วันนี้ ≥ 10% ?</text>
  <text x="620" y="482" text-anchor="middle" class="small">(หรือ latched แล้ว)</text>

  <!-- yes -> stop box (right) -->
  <path class="f" d="M770,468 L950,468" marker-end="url(#arrow)"/>
  <text x="860" y="460" text-anchor="middle" class="edge">yes</text>
  <rect x="950" y="428" width="250" height="80" rx="8" fill="#fde8e8" stroke="#ea4335"/>
  <text x="1075" y="452" text-anchor="middle" class="small">g_ddStopped = true</text>
  <text x="1075" y="470" text-anchor="middle" class="small">STOP_ONLY → ไม่เปิดออเดอร์ใหม่</text>
  <text x="1075" y="488" text-anchor="middle" class="small">CLOSE_ALL → ปิดทุกออเดอร์</text>
  <text x="1075" y="504" text-anchor="middle" class="small">return (ข้ามการเข้าเทรด)</text>

  <!-- no -> down -->
  <path class="f" d="M620,518 L620,556" marker-end="url(#arrow)"/>
  <text x="635" y="540" class="edge">no</text>

  <!-- for each symbol -->
  <rect x="440" y="558" width="360" height="46" rx="8" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="620" y="586" text-anchor="middle" class="lbl">for each symbol →  ProcessSymbol(i)</text>
  <path class="f" d="M620,604 L620,648" marker-end="url(#arrow)"/>

  <!-- ============ SECTION 2: ProcessSymbol ============ -->
  <text x="40" y="648" class="sub">② ProcessSymbol(i)  — state machine ต่อ symbol</text>

  <!-- new bar -->
  <polygon points="620,654 760,696 620,738 480,696" fill="#fff3cd" stroke="#f0ad4e"/>
  <text x="620" y="700" text-anchor="middle" class="lbl">แท่งใหม่ปิด? (IsNewBar)</text>
  <path class="f" d="M760,696 L900,696" marker-end="url(#arrow)"/>
  <text x="830" y="688" text-anchor="middle" class="edge">no → return</text>
  <path class="f" d="M620,738 L620,772" marker-end="url(#arrow)"/>

  <!-- finalize range -->
  <rect x="400" y="774" width="440" height="46" rx="8" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="620" y="796" text-anchor="middle" class="small">ถ้าเลย OR-end &amp; ยังไม่มีกรอบ → FinalizeRange(i)</text>
  <text x="620" y="813" text-anchor="middle" class="small">(หา orHigh / orLow ของช่วงเปิดตลาด)</text>
  <path class="f" d="M620,820 L620,852" marker-end="url(#arrow)"/>

  <!-- gate -->
  <polygon points="620,856 820,910 620,964 420,910" fill="#fff3cd" stroke="#f0ad4e"/>
  <text x="620" y="902" text-anchor="middle" class="small">ด่านกรอง ครบทุกข้อ?</text>
  <text x="620" y="919" text-anchor="middle" class="small">rangeReady · ยังไม่เทรดวันนี้ · ในช่วงเทรด(orEnd..+210น.) · ขนาดกรอบ OK</text>
  <path class="f" d="M820,910 L960,910" marker-end="url(#arrow)"/>
  <text x="890" y="902" text-anchor="middle" class="edge">fail → return</text>
  <path class="f" d="M620,964 L620,998" marker-end="url(#arrow)"/>

  <!-- entryState -->
  <polygon points="620,1002 740,1046 620,1090 500,1046" fill="#fff3cd" stroke="#f0ad4e"/>
  <text x="620" y="1050" text-anchor="middle" class="lbl">entryState ?</text>

  <!-- IDLE branch left -->
  <path class="f" d="M500,1046 L320,1046 L320,1108" marker-end="url(#arrow)"/>
  <text x="400" y="1038" text-anchor="middle" class="edge">IDLE</text>
  <!-- ARMED branch right -->
  <path class="f" d="M740,1046 L920,1046 L920,1108" marker-end="url(#arrow)"/>
  <text x="840" y="1038" text-anchor="middle" class="edge">ARMED</text>

  <!-- IDLE column (cx=320) -->
  <rect x="120" y="1110" width="400" height="62" rx="8" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="320" y="1134" text-anchor="middle" class="small">CheckBreakout():</text>
  <text x="320" y="1152" text-anchor="middle" class="small">ปิด &gt; orHigh + buf → BUY</text>
  <text x="320" y="1168" text-anchor="middle" class="small">ปิด &lt; orLow − buf → SELL</text>
  <path class="f" d="M320,1172 L320,1202" marker-end="url(#arrow)"/>

  <polygon points="320,1206 500,1252 320,1298 140,1252" fill="#fff3cd" stroke="#f0ad4e"/>
  <text x="320" y="1248" text-anchor="middle" class="small">มีสัญญาณ &amp; ผ่าน filter?</text>
  <text x="320" y="1265" text-anchor="middle" class="small">Trend · News · Spread · Corr</text>
  <path class="f" d="M320,1298 L320,1330" marker-end="url(#arrow)"/>

  <polygon points="320,1334 470,1378 320,1422 170,1378" fill="#fff3cd" stroke="#f0ad4e"/>
  <text x="320" y="1382" text-anchor="middle" class="lbl">InpUseRetest ?</text>
  <!-- true -> ARMED -->
  <path class="f" d="M470,1378 L700,1378 L920,1378 L920,1300" marker-end="url(#arrow)"/>
  <text x="640" y="1370" text-anchor="middle" class="edge">true → ARMED (รอ retest)</text>
  <!-- false -> OpenTrade -->
  <path class="f" d="M320,1422 L320,1500 L600,1500" marker-end="url(#arrow)"/>
  <text x="350" y="1452" text-anchor="middle" class="edge">false</text>

  <!-- ARMED column (cx=920) -->
  <rect x="760" y="1110" width="320" height="40" rx="8" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="920" y="1135" text-anchor="middle" class="small">armedBarsElapsed++</text>
  <path class="f" d="M920,1150 L920,1180" marker-end="url(#arrow)"/>

  <polygon points="920,1184 1070,1228 920,1272 770,1228" fill="#fff3cd" stroke="#f0ad4e"/>
  <text x="920" y="1232" text-anchor="middle" class="small">เกิน 6 แท่ง (timeout)?</text>
  <path class="f" d="M1070,1228 L1150,1228 L1150,1046 L740,1046" marker-end="url(#arrow)"/>
  <text x="1110" y="1220" text-anchor="middle" class="edge">yes → IDLE</text>
  <path class="f" d="M920,1272 L920,1304" marker-end="url(#arrow)"/>
  <text x="935" y="1294" class="edge">no</text>

  <polygon points="920,1308 1080,1352 920,1396 760,1352" fill="#fff3cd" stroke="#f0ad4e"/>
  <text x="920" y="1350" text-anchor="middle" class="small">RetestConfirmed</text>
  <text x="920" y="1367" text-anchor="middle" class="small">&amp; filter ผ่าน?</text>
  <path class="f" d="M920,1396 L920,1500 L640,1500" marker-end="url(#arrow)"/>
  <text x="950" y="1452" text-anchor="middle" class="edge">yes</text>

  <!-- ============ SECTION 3: OpenTrade ============ -->
  <text x="40" y="1500" class="sub">③ OpenTrade(i)</text>

  <ellipse cx="620" cy="1502" rx="22" ry="14" fill="#d7f5dd" stroke="#34a853"/>
  <path class="f" d="M620,1516 L620,1548" marker-end="url(#arrow)"/>

  <rect x="380" y="1550" width="480" height="46" rx="8" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="620" y="1572" text-anchor="middle" class="small">SL = ฝั่งตรงข้ามกรอบ ± buffer (RANGE_OPPOSITE)</text>
  <text x="620" y="1589" text-anchor="middle" class="small">หรือ entry ± ATR × 1.5 (โหมด ATR)</text>
  <path class="f" d="M620,1596 L620,1628" marker-end="url(#arrow)"/>

  <polygon points="620,1632 760,1676 620,1720 480,1676" fill="#fff3cd" stroke="#f0ad4e"/>
  <text x="620" y="1672" text-anchor="middle" class="small">ValidateStops()?</text>
  <text x="620" y="1689" text-anchor="middle" class="small">(SL ไม่แคบเกินไป)</text>
  <path class="f" d="M760,1676 L900,1676" marker-end="url(#arrow)"/>
  <text x="830" y="1668" text-anchor="middle" class="edge">fail → ยกเลิก</text>
  <path class="f" d="M620,1720 L620,1752" marker-end="url(#arrow)"/>

  <rect x="380" y="1754" width="480" height="46" rx="8" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="620" y="1776" text-anchor="middle" class="small">TP = entry ± 1.8 × slDist   (R:R = 1 : 1.8)</text>
  <text x="620" y="1793" text-anchor="middle" class="small">Lot = (balance × 1%) / มูลค่าความเสี่ยงต่อล็อต</text>
  <path class="f" d="M620,1800 L620,1832" marker-end="url(#arrow)"/>

  <rect x="420" y="1834" width="400" height="46" rx="8" fill="#d7f5dd" stroke="#34a853"/>
  <text x="620" y="1856" text-anchor="middle" class="small">trade.Buy / Sell  →  entryState = DONE</text>
  <text x="620" y="1873" text-anchor="middle" class="small">เก็บ initialRisk (= slDist) ไว้คำนวณ R</text>
  <path class="f" d="M620,1880 L620,1924" marker-end="url(#arrow)"/>

  <!-- ============ SECTION 4: R ladder ============ -->
  <text x="40" y="1924" class="sub">④ ManageTrailing  — R = profit / initialRisk  (ดูแลทุก tick)</text>

  <rect x="420" y="1944" width="400" height="40" rx="8" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="620" y="1969" text-anchor="middle" class="small">R ≥ 1.0 → เลื่อน SL มาที่ break-even</text>
  <path class="f" d="M620,1984 L620,2014" marker-end="url(#arrow)"/>

  <rect x="420" y="2016" width="400" height="40" rx="8" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="620" y="2041" text-anchor="middle" class="small">R ≥ 1.2 → trailing SL ห่าง 200 points</text>
  <path class="f" d="M620,2056 L620,2086" marker-end="url(#arrow)"/>

  <rect x="400" y="2088" width="440" height="46" rx="8" fill="#fde8e8" stroke="#ea4335"/>
  <text x="620" y="2110" text-anchor="middle" class="lbl">ปิดออเดอร์เมื่อ:</text>
  <text x="620" y="2128" text-anchor="middle" class="small">แตะ TP (1.8R)  /  SL  /  เวลา 20:00  /  พอร์ตชน DD 10%</text>

  <!-- legend -->
  <text x="40" y="2200" class="sub">สัญลักษณ์</text>
  <rect x="40"  y="2218" width="26" height="18" rx="4" fill="#e8f0fe" stroke="#4285f4"/><text x="74" y="2232" class="small">ขั้นตอน / process</text>
  <polygon points="240,2218 268,2227 240,2236 212,2227" fill="#fff3cd" stroke="#f0ad4e"/><text x="278" y="2232" class="small">เงื่อนไข / decision</text>
  <rect x="430" y="2218" width="26" height="18" rx="4" fill="#d7f5dd" stroke="#34a853"/><text x="464" y="2232" class="small">เปิด/จัดการออเดอร์</text>
  <rect x="640" y="2218" width="26" height="18" rx="4" fill="#fde8e8" stroke="#ea4335"/><text x="674" y="2232" class="small">หยุด / ปิด / ตัดความเสี่ยง</text>
  <rect x="860" y="2218" width="26" height="18" rx="4" fill="#ede7f6" stroke="#7e57c2"/><text x="894" y="2232" class="small">ทำงานเสมอ (ทุก tick)</text>
</svg>
